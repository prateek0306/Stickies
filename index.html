<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky Notes Board</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1828/1828817.png">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Toolbar ── -->
  <div id="toolbar">
    <span class="logo">📌 Stickies</span>
    <div class="divider"></div>

    <button class="btn btn-primary" onclick="addNote()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>New Note</span>
    </button>

    <button class="btn btn-ghost" onclick="clearAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
      <span>Clear All</span>
    </button>

    <span id="note-count"></span>

    <div id="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="text" placeholder="Search notes…" oninput="filterNotes()" />
    </div>
  </div>

  <!-- ── Board ── -->
  <div id="board">
    <div id="empty-state">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#7a6040" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <line x1="8" y1="9" x2="16" y2="9"/>
        <line x1="8" y1="13" x2="14" y2="13"/>
      </svg>
      <p>Your board is empty.<br/>Click "New Note" to begin!</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
